    item.enchantment.props.rune_protection.lore.2: '一个保护词条，附魔失败时将会消耗'
    item.enchantment.props.rune_protection.lore.3: '词条并保护物品不被损坏。'

    item.enchantment.props.rune_slot: "拓展符文"
    item.enchantment.props.rune_slot.lore.1: '可以在铁砧中使用，将会给物品'
    item.enchantment.props.rune_slot.lore.2: '额外增加一个可附魔槽位。'

    item.enchantment.props.ashes_o_enchantment: "魔咒之尘"
    item.enchantment.props.ashes_o_enchantment.lore.1: '可以在铁砧中使用，将会给附魔书'
    item.enchantment.props.ashes_o_enchantment.lore.2: '减少 3% 的失败率。'

    item.enchantment.props.tome_of_renewal: "重生之书"
    item.enchantment.props.tome_of_renewal.lore.1: '可以在附魔台中使用，将刷新'
    item.enchantment.props.tome_of_renewal.lore.2: '下次可选择的魔咒列表。'

    item.enchantment.props.tome_of_reversal: "反转之书"
    item.enchantment.props.tome_of_reversal.lore.1: '可以在附魔台中使用，将获得上一次'
    item.enchantment.props.tome_of_reversal.lore.2: '附魔时获得的附魔书。'

    item.enchantment.props.repair_material_50p: "修复材料（50%）"
    item.enchantment.props.repair_material_600s: "修复材料（600秒）"
    item.enchantment.props.repair_material.lore.1: '可以在修复桌中使用，光标持材料点击正在'
    item.enchantment.props.repair_material.lore.2: '修复的物品，减少当前装备的修复时间。'


##
## 模板
##
templates#models#item:
  # 模型 - 简单2D物品模型(自动生成)
  enchantment:special/prop:
    item-model: "${path}"
    model:
      type: "minecraft:model"
      path: "${path}"
      generation:
        parent: "minecraft:item/generated"
        textures:
          "layer0": "${path}"


##
## 物品
##
items#misc#materials:
  enchantment:rune_power_30:
    material: paper
    item-model: "minecraft:firenchant/props/${__ID__}"
    model:
      type: "minecraft:model"
      path: "minecraft:firenchant/props/${__ID__}"
      generation:
        parent: "minecraft:item/generated"
        textures:
          "layer0": "minecraft:firenchant/props/rune_power"
    data:
      item-name: "<!i><yellow><i18n:item.enchantment.props.${__ID__}>"
      lore:
        - "<!i><#a7a7a7>成功率: <red>30%"
        - "<!i><#a3aab6><i18n:item.enchantment.props.rune_power.lore.1>"
        - "<!i><#a3aab6><i18n:item.enchantment.props.rune_power.lore.2>"
