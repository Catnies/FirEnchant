categories:
  enchantment:
    name: "<!i><#FFD700>附魔相关</#FFD700>"
    icon: enchantment:ashes_o_enchantment
    list:
      - "#enchantment:originbooks"
      - "#enchantment:props"
      - "#enchantment:brokengears"
      - "#enchantment:enchantedbook"
      - "#enchantment:ui"
  enchantment:props:
    name: "<!i><#FFD700>道具</#FFD700>"
    icon: enchantment:ashes_o_enchantment
    hidden: true
    list:
      - enchantment:rune_power_30
      - enchantment:rune_power_50
      - enchantment:rune_power_75
      - enchantment:rune_power_100
      - enchantment:rune_protection
      - enchantment:rune_slot
      - enchantment:ashes_o_enchantment
      - enchantment:tome_of_renewal
      - enchantment:tome_of_reversal
      - enchantment:repair_material_50p
      - enchantment:repair_material_600s
      - enchantment:random_enchanted_book



