##
## 模板
##
templates#enchantment#originbooks:
  # 配置模板 - 原始附魔书
  custom:special/enchantment/originbooks:
    material: paper
    model:
      type: "minecraft:model"
      path: "minecraft:firenchant/originbooks/${__ID__}"
      generation:
        parent: "minecraft:item/generated"
        textures:
          "layer0": "minecraft:firenchant/originbooks/${__ID__}"
    data:
      item-name: "<!i><#FFFFFF><i18n:item.enchantment.originbooks.${__ID__}>"
      lore:
        - "<!i><#a8a8a8>未注入魔咒的附魔书，可以在附魔台上附魔。"
      components:
        minecraft:enchantable:
          value: 14


